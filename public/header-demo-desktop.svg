<svg width="1440" height="360" viewBox="0 0 1440 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Abstract security monitoring pattern representing threat intelligence and defense systems">
  <defs>
    <linearGradient id="bg-demo" x1="0" y1="0" x2="1440" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="0.5" stop-color="#070A0E"/>
      <stop offset="1" stop-color="#05080E"/>
    </linearGradient>
    <linearGradient id="amber-glow" x1="0" y1="180" x2="600" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C8A850"/>
      <stop offset="1" stop-color="#7C6120"/>
    </linearGradient>
    <linearGradient id="alert-glow" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C84040"/>
      <stop offset="1" stop-color="#7C2020"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1440" height="360" fill="url(#bg-demo)"/>
  <!-- Ambient glow spots -->
  <ellipse cx="200" cy="100" rx="300" ry="180" fill="#C8A850" fill-opacity="0.04"/>
  <ellipse cx="1200" cy="280" rx="350" ry="200" fill="#C84040" fill-opacity="0.03"/>
  <!-- Circuit/grid pattern -->
  <g stroke="#C8A850" stroke-opacity="0.12" stroke-width="1">
    <line x1="100" y1="0" x2="100" y2="360"/>
    <line x1="250" y1="0" x2="250" y2="360"/>
    <line x1="400" y1="0" x2="400" y2="360"/>
    <line x1="550" y1="0" x2="550" y2="360"/>
    <line x1="0" y1="90" x2="650" y2="90"/>
    <line x1="0" y1="180" x2="750" y2="180"/>
    <line x1="0" y1="270" x2="600" y2="270"/>
  </g>
  <!-- Diagonal scan lines -->
  <path d="M0 320 L500 60" stroke="#C8A850" stroke-opacity="0.06" stroke-width="1.5"/>
  <path d="M0 360 L600 80" stroke="#C8A850" stroke-opacity="0.04" stroke-width="1"/>
  <path d="M900 0 L1440 180" stroke="#C84040" stroke-opacity="0.05" stroke-width="1.5"/>
  <!-- Data flow curves -->
  <path d="M0 300 Q300 220 600 250 T1100 200 T1440 240" stroke="url(#amber-glow)" stroke-width="2.5" fill="none" stroke-opacity="0.25"/>
  <path d="M0 340 Q400 280 800 300 T1440 280" stroke="#C8A850" stroke-width="1.5" fill="none" stroke-opacity="0.15"/>
  <!-- Security monitoring nodes -->
  <g>
    <!-- Threat node cluster -->
    <circle cx="180" cy="120" r="45" fill="#0D1420" stroke="#C8A850" stroke-width="1.5" stroke-opacity="0.35"/>
    <circle cx="180" cy="120" r="25" fill="#C84040" fill-opacity="0.15" stroke="#C84040" stroke-width="1" stroke-opacity="0.4"/>
    <circle cx="180" cy="120" r="8" fill="#C84040" fill-opacity="0.5"/>
    <!-- Connected defense nodes -->
    <circle cx="320" cy="160" r="30" fill="#0D1420" stroke="#40A870" stroke-width="1.5" stroke-opacity="0.35"/>
    <circle cx="320" cy="160" r="12" fill="#40A870" fill-opacity="0.25"/>
    <circle cx="260" cy="220" r="22" fill="#0D1420" stroke="#C8A850" stroke-width="1" stroke-opacity="0.3"/>
    <circle cx="260" cy="220" r="8" fill="#C8A850" fill-opacity="0.3"/>
    <!-- Connection lines -->
    <line x1="180" y1="120" x2="320" y2="160" stroke="#C8A850" stroke-width="1" stroke-opacity="0.2"/>
    <line x1="320" y1="160" x2="260" y2="220" stroke="#40A870" stroke-width="1" stroke-opacity="0.18"/>
    <line x1="180" y1="120" x2="260" y2="220" stroke="#C84040" stroke-width="1" stroke-opacity="0.15"/>
  </g>
  <!-- Terminal/monitor blocks -->
  <g transform="translate(650, 60)">
    <rect width="280" height="160" rx="12" fill="#0D1420" stroke="#C8A850" stroke-opacity="0.25" stroke-width="1"/>
    <rect x="20" y="25" width="100" height="10" rx="5" fill="#C84040" fill-opacity="0.5"/>
    <rect x="20" y="50" width="160" height="8" rx="4" fill="#2B3443"/>
    <rect x="20" y="70" width="130" height="8" rx="4" fill="#2B3443" fill-opacity="0.8"/>
    <rect x="20" y="90" width="100" height="8" rx="4" fill="#2B3443" fill-opacity="0.6"/>
    <!-- Status indicator -->
    <rect x="200" y="25" width="55" height="55" rx="8" fill="url(#amber-glow)" fill-opacity="0.2"/>
    <circle cx="228" cy="52" r="15" fill="#C8A850" fill-opacity="0.3"/>
    <!-- Scan line animation hint -->
    <rect x="20" y="120" width="240" height="2" fill="#C8A850" fill-opacity="0.15"/>
  </g>
  <!-- Defense shield abstract -->
  <g transform="translate(1050, 80)">
    <rect width="180" height="120" rx="10" fill="#0D1420" stroke="#40A870" stroke-opacity="0.25" stroke-width="1"/>
    <circle cx="50" cy="60" r="25" fill="#40A870" fill-opacity="0.12" stroke="#40A870" stroke-width="1.5" stroke-opacity="0.3"/>
    <circle cx="120" cy="60" r="20" fill="#C8A850" fill-opacity="0.1" stroke="#C8A850" stroke-width="1" stroke-opacity="0.25"/>
    <rect x="25" y="100" width="130" height="4" rx="2" fill="#40A870" fill-opacity="0.2"/>
  </g>
  <!-- Floating threat particles -->
  <circle cx="500" cy="80" r="6" fill="#C84040" fill-opacity="0.3"/>
  <circle cx="580" cy="120" r="4" fill="#C8A850" fill-opacity="0.25"/>
  <circle cx="450" cy="150" r="5" fill="#C84040" fill-opacity="0.2"/>
  <circle cx="1000" cy="300" r="7" fill="#C8A850" fill-opacity="0.2"/>
  <circle cx="1100" cy="320" r="4" fill="#40A870" fill-opacity="0.25"/>
  <circle cx="1300" cy="100" r="5" fill="#C84040" fill-opacity="0.18"/>
  <!-- Corner brackets (HUD style) -->
  <g stroke="#C8A850" stroke-opacity="0.3" stroke-width="2">
    <path d="M30 30 L30 60 M30 30 L60 30"/>
    <path d="M1410 30 L1410 60 M1410 30 L1380 30"/>
    <path d="M30 330 L30 300 M30 330 L60 330"/>
    <path d="M1410 330 L1410 300 M1410 330 L1380 330"/>
  </g>
</svg>
