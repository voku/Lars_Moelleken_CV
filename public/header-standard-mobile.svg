<svg width="720" height="900" viewBox="0 0 720 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Standard CV mobile header artwork</title>
  <desc id="desc">A mobile hero illustration highlighting PHP architecture, delivery, automation, and quality signals.</desc>
  <defs>
    <linearGradient id="bg" x1="48" y1="56" x2="640" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EFF6FF"/>
      <stop offset="0.55" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="accent" x1="108" y1="136" x2="592" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
  </defs>
  <rect width="720" height="900" rx="40" fill="url(#bg)"/>
  <circle cx="564" cy="136" r="116" fill="#BFDBFE" fill-opacity="0.55"/>
  <circle cx="156" cy="760" r="152" fill="#DBEAFE"/>
  <rect x="72" y="92" width="576" height="716" rx="32" fill="white" fill-opacity="0.92" stroke="#BFDBFE" stroke-width="2"/>
  <rect x="108" y="132" width="228" height="36" rx="18" fill="#DBEAFE"/>
  <text x="132" y="155" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" letter-spacing="2">SENIOR PHP DEVELOPER</text>
  <text x="108" y="224" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="700">Modernize</text>
  <text x="108" y="286" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="700">legacy systems</text>
  <text x="108" y="348" fill="#2563EB" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="700">without slowing teams</text>
  <text x="108" y="406" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="24">Architecture · Refactoring · CI/CD · Quality Gates</text>
  <rect x="108" y="462" width="504" height="170" rx="28" fill="#0F172A"/>
  <rect x="136" y="496" width="180" height="18" rx="9" fill="#60A5FA"/>
  <rect x="136" y="536" width="286" height="14" rx="7" fill="#334155"/>
  <rect x="136" y="566" width="224" height="14" rx="7" fill="#334155"/>
  <rect x="136" y="596" width="188" height="14" rx="7" fill="#334155"/>
  <rect x="450" y="496" width="126" height="106" rx="18" fill="url(#accent)"/>
  <text x="474" y="536" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">PHP</text>
  <text x="474" y="570" fill="#DBEAFE" font-family="Arial, Helvetica, sans-serif" font-size="18">8.x / Symfony</text>
  <g fill="#0F172A">
    <rect x="108" y="676" width="146" height="56" rx="18" fill="#E0F2FE"/>
    <rect x="270" y="676" width="146" height="56" rx="18" fill="#DCFCE7"/>
    <rect x="432" y="676" width="180" height="56" rx="18" fill="#F8FAFC"/>
  </g>
  <text x="138" y="711" fill="#0369A1" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Static Analysis</text>
  <text x="308" y="711" fill="#15803D" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Reliable Delivery</text>
  <text x="462" y="711" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Mentoring & Reviews</text>
</svg>
