<svg width="720" height="280" viewBox="0 0 720 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Abstract architectural pattern representing software quality and modern development">
  <defs>
    <linearGradient id="bg-std-m" x1="0" y1="0" x2="720" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EFF6FF"/>
      <stop offset="0.5" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="accent-std-m" x1="0" y1="140" x2="300" y2="140" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#1E40AF"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="720" height="280" fill="url(#bg-std-m)"/>
  <!-- Soft glow -->
  <ellipse cx="580" cy="60" rx="200" ry="120" fill="#BFDBFE" fill-opacity="0.35"/>
  <ellipse cx="100" cy="240" rx="180" ry="100" fill="#DBEAFE" fill-opacity="0.45"/>
  <!-- Grid lines -->
  <g stroke="#93C5FD" stroke-opacity="0.25" stroke-width="1">
    <line x1="80" y1="0" x2="80" y2="280"/>
    <line x1="160" y1="0" x2="160" y2="280"/>
    <line x1="240" y1="0" x2="240" y2="280"/>
    <line x1="0" y1="70" x2="400" y2="70"/>
    <line x1="0" y1="140" x2="450" y2="140"/>
    <line x1="0" y1="210" x2="350" y2="210"/>
  </g>
  <!-- Flow curves -->
  <path d="M0 220 Q150 160 300 180 T600 140 T720 160" stroke="url(#accent-std-m)" stroke-width="2.5" fill="none" stroke-opacity="0.35"/>
  <path d="M0 250 Q200 200 400 220 T720 200" stroke="#60A5FA" stroke-width="1.5" fill="none" stroke-opacity="0.25"/>
  <!-- Building blocks -->
  <rect x="50" y="40" width="100" height="70" rx="6" fill="#2563EB" fill-opacity="0.08" stroke="#2563EB" stroke-opacity="0.18"/>
  <rect x="65" y="55" width="35" height="35" rx="4" fill="#2563EB" fill-opacity="0.15"/>
  <rect x="105" y="65" width="30" height="30" rx="3" fill="#3B82F6" fill-opacity="0.12"/>
  <!-- Connected nodes -->
  <circle cx="380" cy="80" r="28" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5" stroke-opacity="0.3"/>
  <circle cx="480" cy="110" r="20" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5" stroke-opacity="0.25"/>
  <circle cx="430" cy="160" r="16" fill="#BFDBFE" stroke="#60A5FA" stroke-width="1" stroke-opacity="0.25"/>
  <line x1="380" y1="80" x2="480" y2="110" stroke="#2563EB" stroke-width="1" stroke-opacity="0.2"/>
  <line x1="480" y1="110" x2="430" y2="160" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.18"/>
  <!-- Quality dots -->
  <g transform="translate(580, 60)">
    <circle cx="0" cy="0" r="14" fill="#22C55E" fill-opacity="0.15" stroke="#22C55E" stroke-width="1.5" stroke-opacity="0.3"/>
    <circle cx="40" cy="10" r="10" fill="#3B82F6" fill-opacity="0.15" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.25"/>
  </g>
  <!-- Terminal abstract -->
  <g transform="translate(560, 150)">
    <rect width="120" height="80" rx="6" fill="#0F172A" fill-opacity="0.05"/>
    <rect x="15" y="18" width="50" height="6" rx="3" fill="#60A5FA" fill-opacity="0.35"/>
    <rect x="15" y="32" width="70" height="4" rx="2" fill="#334155" fill-opacity="0.25"/>
    <rect x="15" y="44" width="55" height="4" rx="2" fill="#334155" fill-opacity="0.2"/>
  </g>
  <!-- Particles -->
  <circle cx="550" cy="50" r="4" fill="#2563EB" fill-opacity="0.22"/>
  <circle cx="620" cy="200" r="5" fill="#3B82F6" fill-opacity="0.18"/>
  <circle cx="280" cy="60" r="3" fill="#60A5FA" fill-opacity="0.2"/>
</svg>
