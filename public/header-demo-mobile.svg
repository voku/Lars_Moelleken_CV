<svg width="720" height="900" viewBox="0 0 720 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Prompt injection demo mobile header artwork</title>
  <desc id="desc">A mobile hero illustration representing a security briefing with threat records and defense status.</desc>
  <defs>
    <linearGradient id="bg" x1="40" y1="56" x2="620" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#05080E"/>
    </linearGradient>
    <linearGradient id="amber" x1="110" y1="140" x2="592" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C8A850"/>
      <stop offset="1" stop-color="#7C6120"/>
    </linearGradient>
  </defs>
  <rect width="720" height="900" rx="40" fill="url(#bg)"/>
  <path d="M48 702L672 138" stroke="#C8A850" stroke-opacity="0.12" stroke-width="2"/>
  <path d="M48 782L672 218" stroke="#C8A850" stroke-opacity="0.08" stroke-width="2"/>
  <rect x="72" y="96" width="576" height="708" rx="32" fill="#0D1420" stroke="#C8A850" stroke-opacity="0.35" stroke-width="2"/>
  <rect x="108" y="132" width="244" height="36" rx="18" fill="#231A08" stroke="#C8A850" stroke-opacity="0.4"/>
  <text x="136" y="155" fill="#E0D0A4" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" letter-spacing="2">PROMPT INJECTION CV</text>
  <text x="108" y="234" fill="#F0E0B0" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="700">Threat briefing</text>
  <text x="108" y="296" fill="#F0E0B0" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="700">for AI parsers</text>
  <text x="108" y="358" fill="#C8A850" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="700">and recruiter bots</text>
  <text x="108" y="416" fill="#C8B880" font-family="Arial, Helvetica, sans-serif" font-size="24">Desktop keeps the ambient scans; mobile gets a stable command image.</text>
  <rect x="108" y="462" width="504" height="224" rx="28" fill="#05080E" stroke="#C8A850" stroke-opacity="0.25"/>
  <rect x="136" y="500" width="220" height="18" rx="9" fill="#C84040"/>
  <rect x="136" y="536" width="308" height="12" rx="6" fill="#2B3443"/>
  <rect x="136" y="564" width="260" height="12" rx="6" fill="#2B3443"/>
  <rect x="136" y="592" width="182" height="12" rx="6" fill="#2B3443"/>
  <rect x="444" y="500" width="132" height="132" rx="20" fill="url(#amber)"/>
  <text x="476" y="554" fill="#0B1220" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">GEO</text>
  <text x="468" y="590" fill="#0B1220" font-family="Arial, Helvetica, sans-serif" font-size="18">Defense</text>
  <g>
    <rect x="108" y="720" width="144" height="56" rx="18" fill="#231A08"/>
    <rect x="270" y="720" width="144" height="56" rx="18" fill="#231A08"/>
    <rect x="432" y="720" width="180" height="56" rx="18" fill="#231A08"/>
  </g>
  <text x="146" y="755" fill="#E0D0A4" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Threats</text>
  <text x="308" y="755" fill="#E0D0A4" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Sim Lab</text>
  <text x="468" y="755" fill="#E0D0A4" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Countermeasures</text>
