<svg width="720" height="280" viewBox="0 0 720 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Abstract security monitoring pattern representing threat intelligence and defense systems">
  <defs>
    <linearGradient id="bg-demo-m" x1="0" y1="0" x2="720" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="0.5" stop-color="#070A0E"/>
      <stop offset="1" stop-color="#05080E"/>
    </linearGradient>
    <linearGradient id="amber-m" x1="0" y1="140" x2="400" y2="140" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C8A850"/>
      <stop offset="1" stop-color="#7C6120"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="720" height="280" fill="url(#bg-demo-m)"/>
  <!-- Ambient glows -->
  <ellipse cx="120" cy="80" rx="180" ry="120" fill="#C8A850" fill-opacity="0.04"/>
  <ellipse cx="600" cy="220" rx="200" ry="120" fill="#C84040" fill-opacity="0.03"/>
  <!-- Grid pattern -->
  <g stroke="#C8A850" stroke-opacity="0.1" stroke-width="1">
    <line x1="80" y1="0" x2="80" y2="280"/>
    <line x1="180" y1="0" x2="180" y2="280"/>
    <line x1="280" y1="0" x2="280" y2="280"/>
    <line x1="0" y1="70" x2="400" y2="70"/>
    <line x1="0" y1="140" x2="450" y2="140"/>
    <line x1="0" y1="210" x2="350" y2="210"/>
  </g>
  <!-- Diagonal scans -->
  <path d="M0 250 L350 50" stroke="#C8A850" stroke-opacity="0.05" stroke-width="1"/>
  <path d="M500 0 L720 140" stroke="#C84040" stroke-opacity="0.04" stroke-width="1"/>
  <!-- Data flow -->
  <path d="M0 230 Q200 170 400 200 T720 180" stroke="url(#amber-m)" stroke-width="2" fill="none" stroke-opacity="0.2"/>
  <!-- Security nodes -->
  <g>
    <circle cx="120" cy="90" r="32" fill="#0D1420" stroke="#C8A850" stroke-width="1" stroke-opacity="0.3"/>
    <circle cx="120" cy="90" r="18" fill="#C84040" fill-opacity="0.12" stroke="#C84040" stroke-width="1" stroke-opacity="0.35"/>
    <circle cx="120" cy="90" r="6" fill="#C84040" fill-opacity="0.45"/>
    <circle cx="220" cy="120" r="22" fill="#0D1420" stroke="#40A870" stroke-width="1" stroke-opacity="0.3"/>
    <circle cx="220" cy="120" r="8" fill="#40A870" fill-opacity="0.25"/>
    <circle cx="170" cy="170" r="16" fill="#0D1420" stroke="#C8A850" stroke-width="1" stroke-opacity="0.25"/>
    <line x1="120" y1="90" x2="220" y2="120" stroke="#C8A850" stroke-width="1" stroke-opacity="0.15"/>
    <line x1="220" y1="120" x2="170" y2="170" stroke="#40A870" stroke-width="1" stroke-opacity="0.12"/>
  </g>
  <!-- Monitor block -->
  <g transform="translate(380, 50)">
    <rect width="180" height="110" rx="8" fill="#0D1420" stroke="#C8A850" stroke-opacity="0.2" stroke-width="1"/>
    <rect x="15" y="20" width="70" height="8" rx="4" fill="#C84040" fill-opacity="0.45"/>
    <rect x="15" y="40" width="100" height="6" rx="3" fill="#2B3443"/>
    <rect x="15" y="55" width="80" height="6" rx="3" fill="#2B3443" fill-opacity="0.7"/>
    <rect x="130" y="20" width="35" height="35" rx="6" fill="url(#amber-m)" fill-opacity="0.2"/>
    <circle cx="148" cy="38" r="10" fill="#C8A850" fill-opacity="0.25"/>
    <rect x="15" y="80" width="150" height="2" fill="#C8A850" fill-opacity="0.12"/>
  </g>
  <!-- Defense shield -->
  <g transform="translate(580, 140)">
    <rect width="100" height="70" rx="6" fill="#0D1420" stroke="#40A870" stroke-opacity="0.2" stroke-width="1"/>
    <circle cx="30" cy="35" r="16" fill="#40A870" fill-opacity="0.1" stroke="#40A870" stroke-width="1" stroke-opacity="0.25"/>
    <circle cx="70" cy="35" r="12" fill="#C8A850" fill-opacity="0.08" stroke="#C8A850" stroke-width="1" stroke-opacity="0.2"/>
  </g>
  <!-- Particles -->
  <circle cx="320" cy="60" r="4" fill="#C84040" fill-opacity="0.25"/>
  <circle cx="360" cy="100" r="3" fill="#C8A850" fill-opacity="0.2"/>
  <circle cx="280" cy="130" r="3" fill="#C84040" fill-opacity="0.18"/>
  <circle cx="620" cy="100" r="4" fill="#40A870" fill-opacity="0.2"/>
  <!-- Corner brackets -->
  <g stroke="#C8A850" stroke-opacity="0.25" stroke-width="1.5">
    <path d="M20 20 L20 45 M20 20 L45 20"/>
    <path d="M700 20 L700 45 M700 20 L675 20"/>
    <path d="M20 260 L20 235 M20 260 L45 260"/>
    <path d="M700 260 L700 235 M700 260 L675 260"/>
  </g>
</svg>
