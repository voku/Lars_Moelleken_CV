<svg width="1440" height="810" viewBox="0 0 1440 810" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Standard CV desktop header artwork</title>
  <desc id="desc">A desktop hero illustration showing engineering delivery signals, architecture focus, and quality tooling.</desc>
  <defs>
