  <text x="736" y="474" fill="#93C5FD" font-family="Arial, Helvetica, sans-serif" font-size="20">• Static analysis and test automation built into every release</text>
  <text x="736" y="510" fill="#86EFAC" font-family="Arial, Helvetica, sans-serif" font-size="20">• Legacy modernization roadmap paired with measurable quality goals</text>
