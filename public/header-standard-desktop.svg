      <stop offset="1" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="accent" x1="876" y1="180" x2="1240" y2="548" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
  </defs>
  <rect width="1440" height="810" rx="40" fill="url(#bg)"/>
