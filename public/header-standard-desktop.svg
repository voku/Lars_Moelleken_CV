<svg width="1440" height="360" viewBox="0 0 1440 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Abstract architectural pattern representing software quality and modern development">
  <defs>
    <linearGradient id="bg-std" x1="0" y1="0" x2="1440" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EFF6FF"/>
      <stop offset="0.5" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="accent-std" x1="0" y1="180" x2="400" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#1E40AF"/>
    </linearGradient>
    <linearGradient id="glow-std" x1="720" y1="0" x2="720" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B82F6" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#1D4ED8" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1440" height="360" fill="url(#bg-std)"/>
  <!-- Soft glow overlay -->
  <ellipse cx="1100" cy="80" rx="400" ry="200" fill="#BFDBFE" fill-opacity="0.35"/>
  <ellipse cx="200" cy="320" rx="300" ry="150" fill="#DBEAFE" fill-opacity="0.5"/>
  <!-- Abstract architectural grid lines -->
  <g stroke="#93C5FD" stroke-opacity="0.3" stroke-width="1">
    <line x1="120" y1="0" x2="120" y2="360"/>
    <line x1="240" y1="0" x2="240" y2="360"/>
    <line x1="360" y1="0" x2="360" y2="360"/>
    <line x1="480" y1="0" x2="480" y2="360"/>
    <line x1="0" y1="90" x2="600" y2="90"/>
    <line x1="0" y1="180" x2="700" y2="180"/>
    <line x1="0" y1="270" x2="550" y2="270"/>
  </g>
  <!-- Flowing connection curves representing data flow -->
  <path d="M0 280 Q200 200 400 220 T800 180 T1200 160 T1440 200" stroke="url(#accent-std)" stroke-width="3" fill="none" stroke-opacity="0.4"/>
  <path d="M0 320 Q300 260 600 280 T1000 220 T1440 260" stroke="#60A5FA" stroke-width="2" fill="none" stroke-opacity="0.3"/>
  <!-- Geometric building blocks representing architecture -->
  <rect x="80" y="60" width="180" height="120" rx="8" fill="#2563EB" fill-opacity="0.08" stroke="#2563EB" stroke-opacity="0.2"/>
  <rect x="100" y="80" width="60" height="60" rx="4" fill="#2563EB" fill-opacity="0.15"/>
  <rect x="180" y="100" width="60" height="60" rx="4" fill="#3B82F6" fill-opacity="0.12"/>
  <!-- Connected nodes representing system components -->
  <circle cx="600" cy="100" r="40" fill="#DBEAFE" stroke="#2563EB" stroke-width="2" stroke-opacity="0.3"/>
  <circle cx="750" cy="140" r="30" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2" stroke-opacity="0.25"/>
  <circle cx="680" cy="200" r="25" fill="#BFDBFE" stroke="#60A5FA" stroke-width="1.5" stroke-opacity="0.3"/>
  <line x1="600" y1="100" x2="750" y2="140" stroke="#2563EB" stroke-width="1.5" stroke-opacity="0.2"/>
  <line x1="750" y1="140" x2="680" y2="200" stroke="#3B82F6" stroke-width="1.5" stroke-opacity="0.2"/>
  <line x1="600" y1="100" x2="680" y2="200" stroke="#60A5FA" stroke-width="1" stroke-opacity="0.15"/>
  <!-- Quality indicators - abstract checkmarks/shields -->
  <g transform="translate(1000, 80)">
    <rect width="120" height="80" rx="12" fill="#0F172A" fill-opacity="0.04"/>
    <circle cx="40" cy="40" r="20" fill="#22C55E" fill-opacity="0.15" stroke="#22C55E" stroke-width="2" stroke-opacity="0.3"/>
    <circle cx="90" cy="40" r="15" fill="#3B82F6" fill-opacity="0.15" stroke="#3B82F6" stroke-width="1.5" stroke-opacity="0.3"/>
  </g>
  <!-- Terminal/code block abstract -->
  <g transform="translate(1150, 180)">
    <rect width="200" height="120" rx="8" fill="#0F172A" fill-opacity="0.06"/>
    <rect x="20" y="25" width="80" height="8" rx="4" fill="#60A5FA" fill-opacity="0.4"/>
    <rect x="20" y="45" width="120" height="6" rx="3" fill="#334155" fill-opacity="0.3"/>
    <rect x="20" y="60" width="100" height="6" rx="3" fill="#334155" fill-opacity="0.25"/>
    <rect x="20" y="75" width="70" height="6" rx="3" fill="#334155" fill-opacity="0.2"/>
  </g>
  <!-- Floating particles representing continuous improvement -->
  <circle cx="900" cy="60" r="6" fill="#2563EB" fill-opacity="0.25"/>
  <circle cx="950" cy="90" r="4" fill="#3B82F6" fill-opacity="0.2"/>
  <circle cx="870" cy="120" r="5" fill="#60A5FA" fill-opacity="0.22"/>
  <circle cx="1050" cy="280" r="8" fill="#2563EB" fill-opacity="0.18"/>
  <circle cx="1100" cy="320" r="5" fill="#3B82F6" fill-opacity="0.15"/>
</svg>
